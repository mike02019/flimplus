<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Film+ / Register</title>
    <!-- Google Fonts for a modern look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" href="img/pic2.jpg" type="image/x-icon">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
     <div class="top-right-button">
        <a href="index.html">
            <button><i class='bx bx-arrow-back'></i> Back To Home</button>
        </a>
    </div>
    <div class="auth-container">
        <h2 id="formTitle" class="auth-title">Welcome</h2>
        <p id="welcomeText" style="text-align:center;color:rgba(255,255,255,0.75);margin-bottom:22px;">Sign in to continue to Film+</p>

        <div class="social-login-container">
            <button id="google-signin-btn" class="social-btn google-btn" type="button">
                <svg viewBox="0 0 48 48" aria-hidden="true">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 2.56 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
                </svg>
                <span>Continue with Google</span>
            </button>
        </div>

        <div class="divider" aria-hidden="true">OR</div>

        <div class="auth-toggle" role="tablist" aria-label="Auth tabs">
            <a href="#" class="toggle-form active" data-target="login">Sign In</a>
            <a href="#" class="toggle-form" data-target="signup">Sign Up</a>
        </div>

        <form id="loginForm" class="auth-form">
            <input id="loginEmail" type="text" placeholder="Username or Email" required />
            <input id="loginPassword" type="password" placeholder="Password" required />
            <button type="submit">Sign In</button>
        </form>

        <form id="signupForm" class="auth-form hidden">
            <input id="signupName" type="text" placeholder="Username" required />
            <input id="signupEmail" type="email" placeholder="Email" required />
            <input id="signupPassword" type="password" placeholder="Password" required />
            <button type="submit">Create Account</button>
        </form>

        <p id="authError" class="auth-error" aria-live="polite"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAtLmMjP9erQryr9-KtSl4MGoDMefjwlXk",
            authDomain: "filmpluspro-fd8dd.firebaseapp.com",
            projectId: "filmpluspro-fd8dd",
            storageBucket: "filmpluspro-fd8dd.firebasestorage.app",
            messagingSenderId: "533291220327",
            appId: "1:533291220327:web:d78546974a26ca945203c2",
            measurementId: "G-GWGRZQ003B"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        const googleSignInBtn = document.getElementById('google-signin-btn');
        const errorMessageElement = document.getElementById('authError');

        function showError(message) {
            if (!errorMessageElement) return;
            errorMessageElement.textContent = message;
        }

        function setButtonLoading(button, isLoading) {
            if (!button) return;
            button.disabled = isLoading;
            button.style.opacity = isLoading ? '0.7' : '1';
        }

        googleSignInBtn?.addEventListener('click', async () => {
            try {
                setButtonLoading(googleSignInBtn, true);
                errorMessageElement && (errorMessageElement.textContent = '');

                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;

                const userData = {
                    isLoggedIn: true,
                    email: user.email,
                    name: user.displayName || 'Profile',
                    profilePic: user.photoURL || 'img/pic2.jpg',
                    userId: user.uid,
                    loginTime: new Date().toISOString(),
                    moviesWatched: 0,
                    watchParties: 0,
                    totalHours: 0,
                    watchHistory: []
                };

                localStorage.setItem('userData', JSON.stringify(userData));
                // Optional compatibility with older code
                localStorage.setItem('currentUser', JSON.stringify({ id: user.uid, name: user.displayName, email: user.email }));

                window.location.href = 'index.html';
            } catch (error) {
                console.error("Google sign-in error:", error);
                showError('Google sign-in failed. Please try again.');
                setButtonLoading(googleSignInBtn, false);
            }
        });

        // If user is already signed in, just update text (no redirect).
        onAuthStateChanged(auth, (user) => {
            if (!user) return;
            const formTitle = document.getElementById('formTitle');
            const welcomeText = document.getElementById('welcomeText');
            if (formTitle) formTitle.textContent = 'You are signed in';
            if (welcomeText) welcomeText.textContent = `Welcome back, ${user.displayName || user.email || 'user'}!`;
        });
    </script>
    <script src="auth.js"></script>
</body>
</html>
